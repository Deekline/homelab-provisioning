---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - ca-certificates
      - htop
      - jq
      - open-iscsi
    state: present

- name: Enable and start iscsid
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with hostname
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"

- name: Harden SSH — drop config snippet
  copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys
    owner: root
    group: root
    mode: '0644'
  notify: restart sshd

- name: Install UFW
  apt:
    name: ufw
    state: present

- name: UFW — default deny incoming
  ufw:
    default: deny
    direction: incoming

- name: UFW — default allow outgoing
  ufw:
    default: allow
    direction: outgoing

- name: UFW — allow SSH from homelab subnets only
  ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "10.0.0.0/8"

- name: UFW — allow all traffic within cluster subnet (etcd, kubelet, VRRP, Cilium)
  ufw:
    rule: allow
    src: "10.0.30.0/24"

- name: UFW — allow HTTP for Traefik ingress
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW — allow HTTPS for Traefik ingress
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: UFW — enable
  ufw:
    state: enabled
