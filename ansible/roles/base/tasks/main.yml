---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - ca-certificates
      - htop
      - jq
      - open-iscsi
      - qemu-guest-agent
    state: present

- name: Enable and start iscsid
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: Enable and start qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with hostname
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"

- name: Harden SSH — drop config snippet
  copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys
    owner: root
    group: root
    mode: '0644'
  notify: restart sshd

- name: Disable cloud-init network config (prevents re-adding search domain on reboot)
  copy:
    dest: /etc/cloud/cloud.cfg.d/99-no-network-config.cfg
    content: "network: {config: disabled}\n"
    mode: '0644'

- name: Remove search key from netplan cloud-init config
  lineinfile:
    path: /etc/netplan/50-cloud-init.yaml
    regexp: '^\s+search:\s*$'
    state: absent

- name: Remove d-kline.org search entry from netplan cloud-init config
  lineinfile:
    path: /etc/netplan/50-cloud-init.yaml
    regexp: '^\s+-\s+d-kline\.org\s*$'
    state: absent
  notify: netplan apply and restart resolved

- name: Disable UFW — k3s nodes use Cilium for network policy
  ufw:
    state: disabled
