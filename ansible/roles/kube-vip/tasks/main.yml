---
- name: Ensure k3s manifests directory exists
  file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy kube-vip manifest (k3s auto-applies anything placed here)
  template:
    src: kube-vip.yml.j2
    dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
    owner: root
    group: root
    mode: '0644'

- name: Wait for VIP to be reachable
  wait_for:
    host: "{{ k3s_vip }}"
    port: 6443
    timeout: 120
  delegate_to: localhost
  become: false
