---
# All tasks delegate to localhost — Cilium is installed from the controller
# using the kubeconfig fetched from the init node.

- name: Fetch kubeconfig from init node
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_b64
  become: true

- name: Write kubeconfig to controller (replacing 127.0.0.1 with VIP)
  copy:
    content: "{{ kubeconfig_b64.content | b64decode | replace('127.0.0.1', k3s_vip) }}"
    dest: "{{ lookup('env', 'HOME') }}/.kube/config"
    mode: '0600'
  delegate_to: localhost
  become: false

- name: Add Cilium Helm repo
  shell: helm repo add cilium https://helm.cilium.io/ && helm repo update
  delegate_to: localhost
  become: false
  changed_when: false

- name: Install or upgrade Cilium
  shell: |
    helm upgrade --install cilium cilium/cilium \
      --version {{ cilium_chart_version }} \
      --namespace kube-system \
      --set kubeProxyReplacement=true \
      --set k8sServiceHost={{ k3s_vip }} \
      --set k8sServicePort=6443 \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=true \
      --set socketLB.enabled=true \
      --set ipam.mode=kubernetes \
      --set routingMode=native \
      --set autoDirectNodeRoutes=true \
      --set ipv4NativeRoutingCIDR={{ k3s_pod_cidr }}
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  delegate_to: localhost
  become: false

- name: Wait for Cilium pods to be ready
  shell: |
    kubectl wait --for=condition=ready pod \
      -l k8s-app=cilium \
      -n kube-system \
      --timeout=300s
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  delegate_to: localhost
  become: false
