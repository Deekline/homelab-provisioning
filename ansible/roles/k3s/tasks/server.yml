---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Wait for VIP to be reachable before joining
  wait_for:
    host: "{{ k3s_vip }}"
    port: 6443
    timeout: 300
  when: not k3s_binary.stat.exists

- name: Join cluster via VIP as server node
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_EXEC="server \
        --server https://{{ k3s_vip }}:6443 \
        --token={{ k3s_token }} \
        --flannel-backend=none \
        --disable-network-policy \
        --disable=traefik \
        --disable=kube-proxy \
        --disable=servicelb" \
      sh -
  when: not k3s_binary.stat.exists
  args:
    executable: /bin/bash
