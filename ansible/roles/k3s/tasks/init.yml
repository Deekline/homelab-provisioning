---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s with cluster-init (first control-plane node)
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_EXEC="server \
        --cluster-init \
        --token={{ k3s_token }} \
        --tls-san={{ k3s_vip }} \
        --flannel-backend=none \
        --disable-network-policy \
        --disable=traefik \
        --disable=kube-proxy \
        --disable=servicelb \
        --node-taint node-role.kubernetes.io/control-plane:NoSchedule" \
      sh -
  when: not k3s_binary.stat.exists
  args:
    executable: /bin/bash

- name: Wait for k3s API to be ready on this node
  wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    timeout: 120
