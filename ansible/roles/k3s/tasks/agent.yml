---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Wait for VIP to be reachable before joining
  wait_for:
    host: "{{ k3s_vip }}"
    port: 6443
    timeout: 300
  when: not k3s_binary.stat.exists

- name: Join cluster as agent node
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="https://{{ k3s_vip }}:6443" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  when: not k3s_binary.stat.exists
  args:
    executable: /bin/bash
