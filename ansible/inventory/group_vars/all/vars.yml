---
k3s_vip: "10.0.10.9"
dns_server: "10.0.10.10"
k3s_pod_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

k3s_version: "v1.32.3+k3s1"
kube_vip_version: "v0.8.9"
cilium_chart_version: "1.17.3"

kube_vip_interface: "eth0"

k3s_install_url: "https://get.k3s.io"

# ArgoCD bootstrap — verify chart versions with `helm search repo <chart> --versions`
argocd_chart_version: "10.0.0"
sops_operator_chart_version: "0.27.1"

# Path to infra repo on the Ansible controller (Gitea-tracked, not this repo)
infra_dir: "{{ lookup('env', 'HOME') }}/homelab/infra"

# Gitea SSH URL ArgoCD uses to pull manifests
gitea_ssh_url: "ssh://git@10.0.10.150:30009/deekline/homelab-infra.git"

# SSH key used by ArgoCD to authenticate to Gitea (added as deploy key in Gitea)
argocd_gitea_ssh_key_path: "{{ lookup('env', 'HOME') }}/.ssh/argocd_gitea"

# 1Password vault containing the sops-age-key document (matches `make init`)
op_vault: "Personal"
